name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: testing
    - name: Save testing repo SHA
      run: echo "TESTING_SHA=$(git -C testing rev-parse HEAD)" >> $GITHUB_ENV
    - uses: actions/checkout@v4
      with:
        repository: cristianhalita/qa-portfolio-website-development
        path: app
        token: ${{ secrets.APP_REPO_TOKEN }}
    - name: Restore testing repo SHA
      run: echo "GITHUB_SHA=$TESTING_SHA" >> $GITHUB_ENV
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Cache app node_modules
      uses: actions/cache@v4
      with:
        path: app/node_modules
        key: app-node-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
        restore-keys: app-node-${{ runner.os }}-
    - name: Install app dependencies
      working-directory: ./app
      run: npm ci
    - name: Build app
      working-directory: ./app
      run: npm run build
    - name: Start app in background
      working-directory: ./app
      run: npm run preview -- --host &
    - name: Wait for app to be ready
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:4173 > /dev/null; then
            echo "App is ready"
            exit 0
          fi
          echo "Waiting for app to be ready... ($i/30)"
          sleep 2
        done
        echo "App failed to start"
        exit 1
    - name: Cache test node_modules
      uses: actions/cache@v4
      with:
        path: testing/node_modules
        key: test-node-${{ runner.os }}-${{ hashFiles('testing/package-lock.json') }}
        restore-keys: test-node-${{ runner.os }}-
    - name: Install test dependencies
      working-directory: ./testing
      run: npm ci
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('testing/package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-
    - name: Install Playwright Browsers
      working-directory: ./testing
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      working-directory: ./testing
      env:
        CI: true
      run: npm test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: testing/playwright-report/
        retention-days: 30

  deploy:
    if: ${{ needs.test.result == 'success' }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: ./report
    - name: Setup Pages
      uses: actions/configure-pages@v4
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./report
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: testing
    - name: Save testing repo SHA
      run: echo "TESTING_SHA=$(git -C testing rev-parse HEAD)" >> $GITHUB_ENV
    - uses: actions/checkout@v4
      with:
        repository: cristianhalita/qa-portfolio-website-development
        path: app
        token: ${{ secrets.APP_REPO_TOKEN }}
    - name: Restore testing repo SHA
      run: echo "GITHUB_SHA=$TESTING_SHA" >> $GITHUB_ENV
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install app dependencies
      working-directory: ./app
      run: npm ci
    - name: Build app
      working-directory: ./app
      run: npm run build
    - name: Start app in background
      working-directory: ./app
      run: npm run preview -- --host &
    - name: Wait for app to be ready
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:4173 > /dev/null; then
            echo "App is ready"
            break
          fi
          echo "Waiting for app to be ready... ($i/30)"
          sleep 2
        done
    - name: Install test dependencies
      working-directory: ./testing
      run: npm ci
    - name: Install Playwright Browsers
      working-directory: ./testing
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      working-directory: ./testing
      run: npm test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: testing/playwright-report/
        retention-days: 30

  deploy:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: ./report
    - name: Setup Pages
      uses: actions/configure-pages@v4
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./report
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
